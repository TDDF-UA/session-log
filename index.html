<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Session Log — What am I holding?</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

  <video id="webcam" autoplay playsinline muted aria-hidden="true"></video>

  <header id="top-bar">
    <span id="dot" aria-hidden="true"></span>
    <span id="status-text">Point your camera at an object</span>
    <button id="restart-btn" class="chip-btn" hidden>Restart</button>
  </header>

  <div id="start-screen">
    <div id="start-card">
      <h1>Session Log</h1>
      <p>Scan several objects in one sitting. Every confident guess gets added to a running list you can replay.</p>
      <button id="start-btn">Start scanning</button>
      <p id="start-error" role="alert"></p>
    </div>
  </div>

  <main id="app" hidden>

    <section id="current-guess-card">
      <p id="current-label">Current guess</p>
      <div id="guess" aria-live="polite">—</div>
      <p id="confidence"></p>
    </section>

    <section id="log-section" aria-labelledby="log-heading">
      <div id="log-header">
        <h2 id="log-heading">Session log</h2>
        <span id="log-count">0 items</span>
      </div>
      <ul id="log-list" aria-label="Objects identified this session"></ul>
      <p id="log-empty">Nothing identified yet. Point the camera at an object to begin.</p>
    </section>

  </main>

  <span id="sr-announce" class="sr-only" aria-live="assertive"></span>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
